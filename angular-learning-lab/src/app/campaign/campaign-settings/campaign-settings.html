<form class="campaign-settings-form">
  @if (isLoading()) {
    <p class="campaign-settings-status">Loading settings...</p>
  }

  <label class="campaign-settings-field">
    <span>Max Players</span>
    <input
      class="campaign-settings-number"
      type="number"
      min="1"
      max="20"
      [value]="maxPlayers()"
      (input)="setMaxPlayers($event)"
      (change)="warnAboutLargeCampaignIfNeeded()"
    />
  </label>

  <input
    class="campaign-settings-slider"
    type="range"
    min="1"
    max="20"
    step="1"
    [value]="maxPlayers()"
    (input)="setMaxPlayers($event)"
    (change)="warnAboutLargeCampaignIfNeeded()"
    aria-label="Max players"
  />

  <button
    type="button"
    class="campaign-settings-save"
    [disabled]="isLoading() || isSaving()"
    (click)="saveChanges()"
  >
    @if (isSaving()) {
      Saving...
    } @else {
      Save Changes
    }
  </button>
</form>
