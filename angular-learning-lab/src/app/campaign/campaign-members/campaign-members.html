<section class="campaign-members-page" aria-label="Campaign members">
  <table class="campaign-members-table">
    <thead>
      <tr>
        <th scope="col">Username</th>
        <th scope="col">First Name</th>
        <th scope="col">Last Name</th>
        <th scope="col">Nickname</th>
      </tr>
    </thead>
    <tbody>
      @if (isMaster()) {
        <tr class="campaign-members-invite-row">
          <td colspan="4">
            <button
              type="button"
              class="campaign-members-invite-button"
              aria-label="Invite new player"
              title="Invite new player"
              (click)="openInvitePopup()"
            >
              +
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  @if (isInvitePopupOpen()) {
    <div
      class="campaign-members-popup-backdrop"
      role="presentation"
      (click)="closeInvitePopup()"
    >
      <section
        class="campaign-members-popup"
        role="dialog"
        aria-modal="true"
        aria-label="Invite player"
        (click)="$event.stopPropagation()"
      >
        <button
          type="button"
          class="campaign-members-popup-close"
          aria-label="Close invite popup"
          (click)="closeInvitePopup()"
        >
          X
        </button>

        <div class="campaign-members-popup-content">
          <h2>Invite Player</h2>

          @if (playerUsernames().length > 0) {
            <ul class="campaign-members-player-list" aria-label="Available players">
              @for (username of playerUsernames(); track username) {
                <li>
                  <span>{{ username }}</span>
                  <button
                    type="button"
                    class="campaign-members-player-invite"
                    [disabled]="isInviteDisabled(username)"
                    [attr.aria-label]="'Invite ' + username"
                    [title]="invitedUsernames().has(username) ? 'Invite sent' : 'Invite player'"
                    (click)="invitePlayer(username)"
                  >
                    <svg lucideUserPlus aria-hidden="true"></svg>
                  </button>
                </li>
              }
            </ul>
          } @else {
            <p class="campaign-members-empty-players">No available players.</p>
          }
        </div>
      </section>
    </div>
  }
</section>
