<form #characterSheetForm class="character-sheet-page">
  <div class="character-sheet-row">
    <div class="portrait-column">
      <label class="portrait-placeholder">
        <input
          #portraitFileInput
          type="file"
          accept="image/*"
          hidden
          (change)="selectPortrait($event)"
        />

        @if (portraitPreviewUrl(); as previewUrl) {
          <img [src]="previewUrl" alt="Selected character portrait" />
        } @else {
          <span class="portrait-upload-plus" aria-hidden="true">+</span>
          <span class="portrait-upload-label">Click to upload a character profile picture</span>
        }
      </label>
    </div>

    <div class="details-column">
      <section class="sheet-field sheet-field-class">
        <h2>Class</h2>
        <textarea class="sheet-field-control" name="characterClass" aria-label="Class"></textarea>
      </section>
      <section class="sheet-field sheet-field-background">
        <h2>Background</h2>
        <textarea class="sheet-field-control" name="background" aria-label="Background"></textarea>
      </section>
      <section class="sheet-field sheet-field-information">
        <h2>Information</h2>
        <textarea class="sheet-field-control" name="information" aria-label="Information"></textarea>
      </section>
    </div>

    <div class="identity-column">
      <section class="sheet-field">
        <h2>First Name</h2>
        <textarea class="sheet-field-control" name="firstName" aria-label="First Name"></textarea>
      </section>
      <section class="sheet-field">
        <h2>Last Name</h2>
        <textarea class="sheet-field-control" name="lastName" aria-label="Last Name"></textarea>
      </section>
      <section class="sheet-field">
        <h2>Nationality</h2>
        <textarea class="sheet-field-control" name="nationality" aria-label="Nationality"></textarea>
      </section>
      <section class="sheet-field">
        <h2>Height</h2>
        <textarea class="sheet-field-control" name="height" aria-label="Height"></textarea>
      </section>
      <section class="sheet-field">
        <h2>Weight</h2>
        <textarea class="sheet-field-control" name="weight" aria-label="Weight"></textarea>
      </section>
    </div>
  </div>

  <div class="character-sheet-tables-row">
    <app-sheet-table title="Actions/Bonus Actions" [resetVersion]="resetVersion()" />
    <app-sheet-table title="Traits" [resetVersion]="resetVersion()" />
    <app-sheet-table title="Equipment" [resetVersion]="resetVersion()" />
  </div>

  <div class="character-sheet-rating-rows">
    @for (row of ratingRows; track row.label) {
      <app-rating-row
        [imageSrc]="row.imageSrc"
        [label]="row.label"
        [hoverText]="row.hoverText"
        [isPrintReversed]="$odd"
        [resetVersion]="resetVersion()"
      />
    }
  </div>

  <div class="character-sheet-actions">
    <button type="button" class="sheet-action-button sheet-action-clear" (click)="clearSheet()">
      Clear
    </button>
    <button
      type="button"
      class="sheet-action-button sheet-action-publish"
      (click)="publishChanges()"
    >
      Publish Changes
    </button>
    <button type="button" class="sheet-action-button sheet-action-print" (click)="printSheet()">
      Print
    </button>
  </div>
</form>

@if (cropImageEvent()) {
  <div class="portrait-crop-backdrop" (click)="cancelPortraitCrop()">
    <section
      class="portrait-crop-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="portrait-crop-title"
      (click)="$event.stopPropagation()"
    >
      <header class="portrait-crop-header">
        <h2 id="portrait-crop-title">Crop character portrait</h2>
      </header>

      <div
        class="portrait-crop-stage"
        [class.portrait-crop-stage-landscape]="cropImageAspectRatio() >= 1"
        [style.--crop-image-aspect-ratio]="cropImageAspectRatio()"
      >
        <image-cropper
          [imageChangedEvent]="cropImageEvent()"
          [maintainAspectRatio]="true"
          [aspectRatio]="1"
          [resizeToWidth]="512"
          [resizeToHeight]="512"
          [imageQuality]="90"
          [allowMoveImage]="false"
          [hideResizeSquares]="false"
          [transform]="cropTransform()"
          alignImage="center"
          format="jpeg"
          output="base64"
          imageAltText="Character portrait being cropped"
          cropperFrameAriaLabel="Square character portrait crop area"
          (imageCropped)="updatePortraitCrop($event)"
          (imageLoaded)="setCropImageDimensions($event)"
          (loadImageFailed)="handlePortraitLoadFailure()"
        />
      </div>

      <label class="portrait-crop-zoom">
        <span>Zoom</span>
        <input
          type="range"
          min="1"
          max="3"
          step="0.05"
          [value]="cropZoom()"
          (input)="setCropZoom($event)"
        />
      </label>

      @if (cropError(); as error) {
        <p class="portrait-crop-error" role="alert">{{ error }}</p>
      }

      <div class="portrait-crop-actions">
        <button type="button" class="portrait-crop-cancel" (click)="cancelPortraitCrop()">
          Cancel
        </button>
        <button
          type="button"
          class="portrait-crop-apply"
          [disabled]="!pendingPortraitUrl()"
          (click)="applyPortraitCrop()"
        >
          Apply
        </button>
      </div>
    </section>
  </div>
}
