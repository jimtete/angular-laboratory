<nav class="top-nav" [class.top-nav-open]="isMenuOpen()" aria-label="Primary navigation">
  <button
    type="button"
    class="menu-toggle"
    aria-label="Toggle navigation menu"
    [attr.aria-expanded]="isMenuOpen()"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-links" [attr.aria-hidden]="!isMenuOpen()">
    <a
      routerLink="/"
      routerLinkActive="nav-link-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Home
    </a>
    @if (hasCampaignAccess()) {
      <a routerLink="/my-campaigns" routerLinkActive="nav-link-active">
        My Campaigns
      </a>
    }
    @if (hasValidAccessToken()) {
      <a routerLink="/character-sheet" routerLinkActive="nav-link-active">
        Character Sheet
      </a>
    }
  </div>

  <div class="auth-links">
    @if (hasValidAccessToken()) {
      <button type="button" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" routerLinkActive="nav-link-active">
        Login
      </a>
      <a routerLink="/register" routerLinkActive="nav-link-active">
        Register
      </a>
    }
  </div>
</nav>

<main class="page">
  <router-outlet />
</main>

@if (isApiLoading()) {
  <section
    class="api-loading-overlay"
    role="status"
    aria-live="polite"
    aria-label="Loading"
  >
    <div class="api-loading-panel">
      <span class="api-loading-spinner" aria-hidden="true"></span>
    </div>
  </section>
}
